name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# Grant GITHUB_TOKEN the permissions required to make a Pages deployment
permissions:
  pages: write      # to deploy to Pages
  id-token: write   # to verify the deployment originates from correct source
  contents: write   # to push to gh-pages branch

# Environment variables available to all steps
env:
  NEXT_PUBLIC_SITE_TITLE: ${{ vars.NEXT_PUBLIC_SITE_TITLE || github.event.repository.name }}
  NEXT_PUBLIC_SITE_DESCRIPTION: ${{ vars.NEXT_PUBLIC_SITE_DESCRIPTION || 'A modern blog platform built with Next.js, TypeScript, and Tailwind CSS' }}
  NEXT_PUBLIC_SITE_AUTHOR: ${{ vars.NEXT_PUBLIC_SITE_AUTHOR || github.actor }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || '' }}
  NEXT_PUBLIC_TWITTER_HANDLE: ${{ vars.NEXT_PUBLIC_TWITTER_HANDLE || '' }}

jobs:
  # Build
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: |
          # Determine base path automatically based on the repository name.
          # Root domains (e.g., username.github.io) use an empty basePath ("").
          # Project sites (e.g., username.github.io/repo-name) use "/repo-name".
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *".github.io" ]]; then
            BASE_PATH=""
          else
            BASE_PATH="/$REPO_NAME"
          fi
          echo "Building with NEXT_PUBLIC_BASE_PATH=$BASE_PATH"
          echo "Site Title: $NEXT_PUBLIC_SITE_TITLE"
          npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name == github.actor + '.github.io' && '' || format('/{0}', github.event.repository.name) }}

      - name: Verify 404.html exists
        run: |
          if [ ! -f out/404.html ]; then
            echo "Error: 404.html not found in build output"
            exit 1
          fi
          echo "404.html found successfully"

      - name: Copy 404.html for GitHub Pages
        run: cp out/404.html out/404/index.html

      - name: Create .nojekyll file
        run: touch out/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true