name: Multi-Repo Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_to_remotes:
        description: 'Whether to deploy to remote repositories'
        type: boolean
        default: false

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write    # Required for pushing to other repos via PAT
  pages: write
  id-token: write

jobs:
  # The "build-and-deploy" job handles both the main repo and any external mirrors
  deploy:
    name: Deploy to ${{ matrix.target }}
    runs-on: ubuntu-latest
    # Added environment for local Pages deployment to satisfy requirements
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: self
            # title: "My Primary Blog"  # Optional: Override the default title
          - target: "DswithAnn/DswithAnn.github.io"
            title: "Automate with Ann"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages (Detection)
        id: pages
        if: matrix.target == 'self'
        uses: actions/configure-pages@v5

      - name: Resolve Environment
        id: env
        run: |
          if [[ "${{ matrix.target }}" == "self" ]]; then
            echo "BASE_PATH=${{ steps.pages.outputs.base_path }}" >> $GITHUB_OUTPUT
            echo "REPO_FULL_NAME=${{ github.repository }}" >> $GITHUB_OUTPUT
          else
            # For remote repos, calculate base path from repo name
            REPO_NAME=$(echo "${{ matrix.target }}" | cut -d'/' -f2)
            echo "BASE_PATH=/$REPO_NAME" >> $GITHUB_OUTPUT
            echo "REPO_FULL_NAME=${{ matrix.target }}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_BASE_PATH: ${{ steps.env.outputs.BASE_PATH }}
          # Title order: 1. Matrix Title, 2. Repo Variable, 3. 'Ann Naser Nabil' (default)
          NEXT_PUBLIC_SITE_TITLE: ${{ matrix.title || vars.NEXT_PUBLIC_SITE_TITLE || 'Ann Naser Nabil' }}
          NEXT_PUBLIC_SITE_DESCRIPTION: ${{ vars.NEXT_PUBLIC_SITE_DESCRIPTION || 'A modern blog platform built with Next.js, TypeScript, and Tailwind CSS' }}
          NEXT_PUBLIC_SITE_AUTHOR: ${{ vars.NEXT_PUBLIC_SITE_AUTHOR || github.actor }}

      - name: Post-build assets correction
        run: |
          touch out/.nojekyll
          mkdir -p out/404
          cp out/404.html out/404/index.html || echo "Warning: 404.html not found"

      - name: Verify Build Output
        run: |
          echo "Listing contents of 'out' directory:"
          ls -R out

      # --- DEPLOYMENT STRATEGY ---

      # A. Deploy to LOCAL repository using modern Actions source
      - name: Upload Local Pages Artifact
        if: matrix.target == 'self'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy Local Pages
        if: matrix.target == 'self'
        id: deployment
        uses: actions/deploy-pages@v4

      # B. Deploy to REMOTE repositories using PAT/Branch source
      # Note: This requires MULTI_REPO_DEPLOY_TOKEN secret to be set
      - name: Deploy to Remote Repo
        if: matrix.target != 'self'
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Use personal access token for external repository push
          github_token: ${{ secrets.MULTI_REPO_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          external_repository: ${{ matrix.target }}
          publish_branch: gh-pages
          publish_dir: ./out
          force_orphan: true
